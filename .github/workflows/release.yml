name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS packages
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Create macOS app bundle
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APP="dist/ClaudeForge.app"

          rm -rf dist
          mkdir -p "$APP/Contents/MacOS"
          cp target/release/claude-forge "$APP/Contents/MacOS/ClaudeForge"
          chmod +x "$APP/Contents/MacOS/ClaudeForge"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleDisplayName</key>
              <string>ClaudeForge</string>
              <key>CFBundleExecutable</key>
              <string>ClaudeForge</string>
              <key>CFBundleIdentifier</key>
              <string>com.sunny891024.claudeforge</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>ClaudeForge</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Package zip and dmg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent dist/ClaudeForge.app "dist/ClaudeForge-${VERSION}-macOS.zip"
          hdiutil create \
            -volname ClaudeForge \
            -srcfolder dist/ClaudeForge.app \
            -ov \
            -format UDZO \
            "dist/ClaudeForge-${VERSION}-macOS.dmg"
          shasum -a 256 "dist/ClaudeForge-${VERSION}-macOS.zip" "dist/ClaudeForge-${VERSION}-macOS.dmg" > dist/checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cat > release-notes.md <<NOTES
          ClaudeForge ${VERSION}

          macOS packages:

          - ClaudeForge-${VERSION}-macOS.dmg
          - ClaudeForge-${VERSION}-macOS.zip

          Checksums are included in checksums.txt.
          NOTES

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/ClaudeForge-${VERSION}-macOS.dmg" \
              "dist/ClaudeForge-${VERSION}-macOS.zip" \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$TAG" \
              "dist/ClaudeForge-${VERSION}-macOS.dmg" \
              "dist/ClaudeForge-${VERSION}-macOS.zip" \
              dist/checksums.txt \
              --title "ClaudeForge ${VERSION}" \
              --notes-file release-notes.md
          fi
